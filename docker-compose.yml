version: "3.8"

services:
  neo4j:
    image: neo4j:latest
    container_name: pensieve-neo4j
    ports:
      - "7474:7474"  # Neo4j Browser UI
      - "7687:7687"  # Bolt protocol (backend connection)
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data  # data persist rahega container restart pe bhi

volumes:
  neo4j_data: